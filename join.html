<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#0E2B20"/>
<title>Joining round… — PlayPal</title>
<style>
  html, body { height:100%; margin:0; background:#0E2B20; color:#F6F4EE; font-family:'Plus Jakarta Sans', 'Inter', system-ui, sans-serif; display:flex; align-items:center; justify-content:center; }
  .pill { padding:12px 18px; border:1px solid rgba(200,161,90,0.4); border-radius:10px; background:rgba(200,161,90,0.12); }
  a { color:#C8A15A; }
</style>
</head>
<body>
<div class="pill">
  <noscript>JavaScript is required to join. <a href="./">Open PlayPal</a></noscript>
  <span id="msg">Joining round…</span>
</div>
<script>
  // Spec URL: /join?code=ROUND_CODE — forward to the SPA which auto-joins.
  // The code is sanitized to alphanumerics so nothing user-controlled is
  // reflected into the redirect URL.
  (function () {
    var params = new URLSearchParams(location.search);
    var raw = (params.get('code') || params.get('join') || '').toUpperCase();
    var code = raw.replace(/[^A-Z0-9]/g, '').slice(0, 12);
    var dir = location.pathname.replace(/[^/]*$/, '');  // strip "join.html" or "join"
    var target = dir + (code ? '?code=' + encodeURIComponent(code) : '');
    location.replace(target);
  })();
</script>
</body>
</html>
