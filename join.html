<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Joining round… — PlayPal</title>
<style>
  html, body { height:100%; margin:0; background:#0A1628; color:#fff; font-family:'DM Sans', sans-serif; display:flex; align-items:center; justify-content:center; }
  .pill { padding:12px 18px; border:1px solid #1E3A6E; border-radius:10px; background:#0F2040; }
  a { color:#3DCB6C; }
</style>
</head>
<body>
<div class="pill">
  <noscript>JavaScript is required to join. <a href="./">Open PlayPal</a></noscript>
  <span id="msg">Joining round…</span>
</div>
<script>
  // Spec URL: /join?code=ROUND_CODE — forward to the SPA which auto-joins.
  (function () {
    var params = new URLSearchParams(location.search);
    var code = (params.get('code') || params.get('join') || '').toUpperCase();
    var dir = location.pathname.replace(/[^/]*$/, '');  // strip "join.html" or "join"
    var target = dir + (code ? '?code=' + encodeURIComponent(code) : '');
    location.replace(target);
  })();
</script>
</body>
</html>
