<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #05090C; color: #F6F4EE; font-family: 'Plus Jakarta Sans', 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; overflow: hidden; }
  #root { height: 100%; }
  button { font-family: inherit; }

  /* ── Ticker cards (rendered imperatively inside the rAF strip) ──────────
     One card = category label chip on top + one big stat line below.
     Sizes scale with viewport width so 75"–98" TVs stay readable and text
     never wraps (whiteSpace: nowrap everywhere in the strip). */
  .bl-card {
    top: 0; height: 100%;
    display: flex; flex-direction: column; justify-content: center;
    padding: 0 3.2vw 0 1.8vw;
    white-space: nowrap;
  }
  .bl-label {
    align-self: flex-start;
    font-size: clamp(10px, 1.05vw, 26px);
    font-weight: 800; letter-spacing: 0.22em;
    color: #C8A15A;
    background: rgba(200,161,90,0.13);
    border: 1px solid rgba(200,161,90,0.35);
    border-radius: 6px;
    padding: 0.25vh 0.7vw;
    margin-bottom: 0.9vh;
  }
  .bl-line {
    display: flex; align-items: baseline; gap: 0.75vw;
    font-size: clamp(18px, 2.4vw, 58px);
    font-weight: 700; letter-spacing: 0.02em;
    line-height: 1.05;
  }
  .bl-name { color: #C8A15A; font-weight: 800; }
  .bl-val  { color: #F6F4EE; font-weight: 800; font-variant-numeric: tabular-nums; }
  .bl-text { color: #F6F4EE; font-weight: 600; }
  .bl-dim  { color: rgba(246,244,238,0.5); font-weight: 600; font-size: 0.72em; }
  .bl-up   { color: #3DCB6C; font-weight: 800; font-variant-numeric: tabular-nums; }
  .bl-down { color: #F26D6D; font-weight: 800; font-variant-numeric: tabular-nums; }
  .bl-sep  { color: rgba(200,161,90,0.55); font-size: 0.7em; padding: 0 0.35vw; }
  .bl-divider {
    position: absolute; right: 1vw; top: 18%; bottom: 18%;
    width: 2px; background: rgba(246,244,238,0.14); border-radius: 2px;
  }
  .bl-card { position: absolute; }

  /* Alert cards: hot ESPN "breaking" treatment. */
  .bl-alert {
    background: linear-gradient(180deg, rgba(255,184,77,0.16), rgba(255,184,77,0.04));
    border-left: 3px solid #FFB84D; border-right: 3px solid #FFB84D;
  }
  .bl-alert .bl-label { animation: blPulse 1.1s ease-in-out infinite; }
  .bl-label-up   { color: #3DCB6C; background: rgba(61,203,108,0.12); border-color: rgba(61,203,108,0.4); }
  .bl-label-down { color: #F26D6D; background: rgba(242,109,109,0.12); border-color: rgba(242,109,109,0.4); }
  .bl-label-hot  { color: #FFB84D; background: rgba(255,184,77,0.12); border-color: rgba(255,184,77,0.4); }

  /* Value-change flash: green/red handled by part colors; the card blinks. */
  .bl-flash { animation: blFlash 1.2s ease-out 1; }
  @keyframes blFlash {
    0%   { background: rgba(61,203,108,0.28); }
    100% { background: transparent; }
  }
  @keyframes blPulse {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.45; }
  }

  .bl-live-dot {
    width: 0.7vw; height: 0.7vw; min-width: 8px; min-height: 8px;
    border-radius: 50%; background: #F26D6D;
    animation: blPulse 1.4s ease-in-out infinite;
  }
  .bl-banner { animation: blBannerIn 0.35s ease-out 1; }
  @keyframes blBannerIn {
    from { transform: translateY(100%); }
    to   { transform: none; }
  }

  /* Stage module cross-fade / entrance. */
  .bl-stage-in { animation: blStageIn 0.55s cubic-bezier(0.22, 0.61, 0.36, 1) 1; }
  @keyframes blStageIn {
    from { opacity: 0; transform: translateY(1.6vh) scale(0.992); }
    to   { opacity: 1; transform: none; }
  }

  @media (prefers-reduced-motion: reduce) {
    .bl-alert .bl-label, .bl-live-dot { animation: none !important; }
    .bl-stage-in { animation-duration: 0.01ms !important; }
  }
</style>

<script>
/* Service worker — same offline shell as the app, so the ticker survives
   brief network drops on the clubhouse TV. */
if ('serviceWorker' in navigator && location.protocol === 'https:') {
  window.addEventListener('load', function () {
    navigator.serviceWorker.register('sw.js').catch(function (err) {
      console.warn('[BottomLine] Service worker registration failed:', err);
    });
  });
}
