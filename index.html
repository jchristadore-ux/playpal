
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>PlayPal — Golf Companion</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="sync-config.js?v=2"></script>
<script src="components/gameData.js?v=4"></script>
<script src="components/gameUtils.js?v=4"></script>
<script src="components/sync.js?v=2"></script>
<script src="https://unpkg.com/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="https://unpkg.com/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #0A1628; color: #fff; font-family: 'DM Sans', sans-serif; -webkit-font-smoothing: antialiased; overflow: hidden; }
  #root { height: 100%; }
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #1E3A6E; border-radius: 4px; }
  input::placeholder { color: #4A6890; }
  button { font-family: 'DM Sans', sans-serif; }
  * { -webkit-tap-highlight-color: transparent; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="components/Shared.jsx"></script>
<script type="text/babel" src="components/Home.jsx"></script>
<script type="text/babel" src="components/Setup.jsx"></script>
<script type="text/babel" src="components/PlayerCard.jsx"></script>
<script type="text/babel" src="components/Trackers.jsx"></script>
<script type="text/babel" src="components/ScoreEntry.jsx"></script>
<script type="text/babel" src="components/Summary.jsx"></script>

<script type="text/babel">

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentGreen": "#3DCB6C",
  "accentGold": "#C9A84C",
  "bgColor": "#0A1628",
  "cardBg": "#0F2040",
  "showSyncCode": true
} /*EDITMODE-END*/;

// Read a sync code from the URL synchronously, BEFORE React's initial state
// is computed. This matters because `pp_screen` from a previous session might
// be "score" — if we let the app boot into the score screen first, the
// HomeScreen's auto-join effect never runs and the URL code is lost.
const INITIAL_URL_CODE = (() => {
  const params = new URLSearchParams(window.location.search);
  const code = (params.get('code') || params.get('join') || '').trim().toUpperCase();
  if (code) console.info('[PlayPal] Code received from URL:', code);
  return code || null;
})();

// ── Round creation — cloud-first architecture ────────────────────────────
// A round CANNOT be considered started until it is successfully written to
// Firebase. If Firebase is configured and the write fails, we surface the
// real error and refuse to proceed. If Firebase is not configured at all
// (local-only mode) we allow the round through with a clear warning banner
// rather than silently failing.
async function createAndPublishRound(roundData) {
  if (!window.PlayPalSync?.isEnabled?.()) {
    console.info('[PlayPal] Local-only mode — skipping cloud publish');
    return { ok: true, round: roundData, localOnly: true };
  }
  console.info('[PlayPal] Publishing round to Firebase BEFORE switching screens:', roundData.syncCode);
  try {
    const res = await window.PlayPalSync.pushRound(roundData.syncCode, roundData);
    if (!res?.ok) {
      const msg = res?.error || 'unknown error';
      console.error('[PlayPal] Round publish failed:', msg);
      return { ok: false, error: msg };
    }
    console.info('[PlayPal] Round published OK:', roundData.syncCode);
    return { ok: true, round: roundData };
  } catch (err) {
    const msg = err?.message || String(err);
    console.error('[PlayPal] Round publish threw:', msg);
    return { ok: false, error: msg };
  }
}

const App = () => {
  // If the URL carries a code, suppress any cached screen/round state on
  // mount — we'll replace them with the joined round below.
  const [screen, setScreen] = React.useState(() =>
    INITIAL_URL_CODE ? 'home' : (localStorage.getItem('pp_screen') || 'home')
  );

  // Players — Firebase is the single source of truth.
  // When Firebase is configured: start empty and hydrate from cloud on mount.
  // When local-only (no Firebase): hydrate from localStorage immediately.
  const _firebaseEnabled = window.PlayPalSync?.isEnabled?.();
  const [players, setPlayers] = React.useState(() => {
    if (_firebaseEnabled) return []; // cloud-first: wait for useEffect below
    const saved = localStorage.getItem('pp_players');
    return saved ? JSON.parse(saved) : DEFAULT_PLAYERS;
  });
  const [appReady, setAppReady]           = React.useState(!_firebaseEnabled);
  const [syncUnavailable, setSyncUnavailable] = React.useState(false);

  const [round, setRound] = React.useState(() => {
    if (INITIAL_URL_CODE) return null; // wait for joinRound to resolve
    const saved = localStorage.getItem('pp_round');
    return saved ? JSON.parse(saved) : null;
  });
  const [joinPrompt, setJoinPrompt] = React.useState(() =>
    INITIAL_URL_CODE ? { code: INITIAL_URL_CODE, status: 'pending', error: '' } : null
  );
  const [isHost,      setIsHost]        = React.useState(false);
  const [finalScores, setFinalScores]   = React.useState(null);
  const [finalWolf,   setFinalWolf]     = React.useState(null);
  const [finalPutts,  setFinalPutts]    = React.useState(null);
  const [finalPresses,setFinalPresses]  = React.useState([]);
  const [finalChips,  setFinalChips]    = React.useState({});
  const [tweaks, setTweaks] = React.useState(TWEAK_DEFAULTS);
  const [tweaksOpen, setTweaksOpen] = React.useState(false);

  const recentRounds = React.useMemo(() => {
    const saved = localStorage.getItem('pp_recent');
    return saved ? JSON.parse(saved) : [
    { courseName: 'Pebble Beach Golf Links', date: 'Apr 20, 2026', players: 4, formats: 'Wolf · Nassau' },
    { courseName: 'Torrey Pines South', date: 'Apr 14, 2026', players: 3, formats: 'Stableford · Skins' }];

  }, []);

  React.useEffect(() => {localStorage.setItem('pp_screen', screen);}, [screen]);

  // ── URL code → auto-join (runs once on mount) ────────────────────────────
  // This is the ONLY place in the app that kicks off an auto-join from the
  // URL. It lives at the App level (not HomeScreen) so it always runs, even
  // when `pp_screen` was previously "score" or "summary". It delegates the
  // entire lookup to PlayPalSync.joinRound — the same function the manual
  // "Join Round" button uses. No duplicated logic.
  React.useEffect(() => {
    if (!INITIAL_URL_CODE) return;
    let cancelled = false;
    (async () => {
      const result = await window.PlayPalSync.joinRound(INITIAL_URL_CODE);
      if (cancelled) return;
      if (result.ok) {
        console.info('[PlayPal] Auto-join succeeded — switching to score screen');
        setRound(result.round);
        setScreen('score');
        setJoinPrompt(null);
        // Strip query params so a refresh doesn't re-attempt the join.
        const url = new URL(window.location.href);
        url.searchParams.delete('code');
        url.searchParams.delete('join');
        window.history.replaceState({}, '', url.toString());
      } else {
        console.warn('[PlayPal] Auto-join failed:', result.error);
        // Keep HomeScreen visible and surface the error in the Join modal.
        setJoinPrompt({ code: INITIAL_URL_CODE, status: 'error', error: result.error });
        // Fall back to the locally cached round if any, so the app is still usable.
        const saved = localStorage.getItem('pp_round');
        if (saved && !round) {
          try { setRound(JSON.parse(saved)); } catch (e) { /* ignore */ }
        }
      }
    })();
    return () => { cancelled = true; };
  }, []);

  // ── Firebase-first player hydration (runs once on mount) ────────────────
  // Cloud is authoritative. localStorage is only consulted when Firebase
  // returns an empty result (brand-new user) so their local defaults seed
  // the cloud. If Firebase is unreachable, we surface a visible banner rather
  // than silently falling back to stale local data.
  React.useEffect(() => {
    if (!window.PlayPalSync?.isEnabled?.()) return; // local-only already set above
    let cancelled = false;
    window.PlayPalSync.listPlayers()
      .then((remote) => {
        if (cancelled) return;
        if (remote && remote.length > 0) {
          // Firebase has players — they are authoritative on every device.
          console.info('[SYNC] Hydrating', remote.length, 'players from Firebase');
          localStorage.setItem('pp_players', JSON.stringify(remote));
          setPlayers(remote);
        } else {
          // Firebase is empty — brand-new account. Seed cloud with the local
          // defaults so future devices also see them.
          const seed = (() => { try { const s = localStorage.getItem('pp_players'); return s ? JSON.parse(s) : DEFAULT_PLAYERS; } catch(e) { return DEFAULT_PLAYERS; } })();
          console.info('[SYNC] Firebase empty — seeding', seed.length, 'players');
          setPlayers(seed);
          seed.forEach(p => window.PlayPalSync.pushPlayer(p).catch(() => {}));
        }
        setAppReady(true);
      })
      .catch((err) => {
        if (cancelled) return;
        console.error('[PlayPal] Cannot reach Firebase for players:', err.message || err);
        setSyncUnavailable(true);
        // Show stale local data with the visible warning banner (not a silent fallback).
        const stale = (() => { try { const s = localStorage.getItem('pp_players'); return s ? JSON.parse(s) : DEFAULT_PLAYERS; } catch(e) { return DEFAULT_PLAYERS; } })();
        setPlayers(stale);
        setAppReady(true);
      });
    return () => { cancelled = true; };
  }, []);

  // Tweaks message handler
  React.useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweaksOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const saveTweakKey = (key, val) => {
    const next = { ...tweaks, [key]: val };
    setTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: val } }, '*');
  };

  // Firebase-first player persistence.
  // Returns true on success, false if Firebase write failed (caller should keep modal open).
  const handleManagePlayers = async (updated) => {
    if (window.PlayPalSync?.isEnabled?.()) {
      // Diff old vs new to detect deletions
      const oldIds = new Set(players.map(p => p.id));
      const newIds = new Set(updated.map(p => p.id));
      const deletedIds = [...oldIds].filter(id => !newIds.has(id));

      const results = await Promise.all([
        ...updated.map(p => window.PlayPalSync.pushPlayer(p)),
        ...deletedIds.map(id => window.PlayPalSync.deletePlayer(id)),
      ]);

      if (results.some(r => !r.ok)) {
        const errors = results.filter(r => !r.ok).map(r => r.error).join(', ');
        console.error('[PlayPal] Player Firebase write failed:', errors);
        setSyncUnavailable(true);
        return false; // Signal failure to caller
      }
    }
    // Firebase confirmed (or disabled) — update cache and state
    localStorage.setItem('pp_players', JSON.stringify(updated));
    setPlayers(updated);
    return true;
  };

  const handleStartRound = async (config) => {
    const roundData = { ...config, id: Date.now() };
    const result = await createAndPublishRound(roundData);
    if (!result.ok) {
      // Firebase is configured but the write failed — hard stop.
      // The round is NOT created. No silent local fallback.
      alert(
        'Cannot start round — failed to publish to Firebase:\n\n' +
        result.error +
        '\n\nCheck your internet connection and Firebase configuration in sync-config.js. ' +
        'The round was NOT created.'
      );
      return;
    }
    // Cloud write succeeded (or local-only mode confirmed).
    // Initialize local state FROM the cloud-confirmed round object.
    setRound(result.round);
    setIsHost(true);
    localStorage.setItem('pp_round', JSON.stringify(result.round));
    setScreen('score');
  };

  const handleSaveRound = (scores, wolfData, putts, presses=[], chips={}) => {
    setFinalScores(scores); setFinalWolf(wolfData); setFinalPutts(putts);
    setFinalPresses(presses); setFinalChips(chips);
    const recent = JSON.parse(localStorage.getItem('pp_recent') || '[]');
    recent.unshift({
      courseName: round.course.name,
      date: new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }),
      players: round.players.length,
      formats: round.formats.map(f => FORMAT_INFO[f.type].label).join(' · '),
      // Full data stored so VIEW can reconstruct the complete scorecard.
      roundData: { round, scores, wolfData, putts, presses, chips },
    });
    localStorage.setItem('pp_recent', JSON.stringify(recent.slice(0, 5)));
    setScreen('summary');
  };

  const handleNewRound = () => {
    setRound(null); setFinalScores(null); setIsHost(false);
    localStorage.removeItem('pp_round');
    setScreen('home');
  };

  const handleCancelRound = () => {
    // Unsubscribe happens automatically when ScoreEntry unmounts.
    // If this device is the host, mark the round cancelled in Firebase
    // so any guests still subscribed know the round is over.
    if (isHost && round?.syncCode && window.PlayPalSync?.isEnabled?.()) {
      window.PlayPalSync.markCancelled(round.syncCode).catch(err =>
        console.warn('[PlayPal] markCancelled error:', err)
      );
    }
    setRound(null); setFinalScores(null); setIsHost(false);
    localStorage.removeItem('pp_round');
    setScreen('home');
  };

  const handleViewRound = (recentEntry) => {
    const { round: vRound, scores, wolfData, putts, presses, chips } = recentEntry.roundData;
    setRound(vRound);
    setFinalScores(scores);
    setFinalWolf(wolfData);
    setFinalPutts(putts);
    setFinalPresses(presses || []);
    setFinalChips(chips || {});
    setScreen('summary');
  };

  // CSS variable injection for tweaks
  const cssVars = { '--green': tweaks.accentGreen, '--gold': tweaks.accentGold, '--bg': tweaks.bgColor, '--card': tweaks.cardBg };

  return (
    <div style={{ height: '100%', display: 'flex', flexDirection: 'column', background: tweaks.bgColor, ...cssVars }}>

      {/* Firebase loading overlay — shown briefly while players hydrate from cloud */}
      {!appReady && (
        <div style={{ position:'fixed', inset:0, background:'#0A1628', zIndex:9999, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:18 }}>
          <div style={{ fontFamily:'Barlow Condensed', fontSize:36, fontWeight:800, color:'#3DCB6C', letterSpacing:4 }}>PLAYPAL</div>
          <div style={{ fontFamily:'DM Sans', fontSize:14, color:'#7A98BC' }}>Loading from Firebase…</div>
        </div>
      )}

      {/* Sync unavailable banner — shown when Firebase is unreachable */}
      {syncUnavailable && (
        <div style={{ background:'rgba(229,83,75,0.12)', border:'1px solid rgba(229,83,75,0.35)', padding:'10px 16px', display:'flex', alignItems:'center', gap:10, flexShrink:0, zIndex:200 }}>
          <span style={{ color:'#E5534B', fontSize:16, flexShrink:0 }}>⚠</span>
          <span style={{ fontFamily:'DM Sans', fontSize:13, color:'#E5534B', flex:1 }}>Cloud sync unavailable — data cannot be trusted. Check your connection.</span>
          <button onClick={()=>setSyncUnavailable(false)} style={{ background:'none', border:'none', color:'#E5534B', cursor:'pointer', fontSize:20, lineHeight:1, padding:'0 4px' }}>✕</button>
        </div>
      )}

      <NavBar
        syncCode={tweaks.showSyncCode && round ? round.syncCode : null}
        onHome={() => setScreen(round ? 'score' : 'home')}
        currentScreen={screen} />
      

      {/* Screen Router */}
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden', position: 'relative' }}>
        {screen === 'home' &&
        <HomeScreen
          onStartRound={() => setScreen('setup')}
          players={players}
          onManagePlayers={handleManagePlayers}
          recentRounds={recentRounds}
          joinPrompt={joinPrompt}
          onDismissJoinPrompt={() => setJoinPrompt(null)}
          onViewRound={handleViewRound}
          onJoinRound={(savedRound) => {
            setRound(savedRound);
            setScreen('score');
          }} />
        }
        {screen === 'setup' &&
        <SetupScreen
          allPlayers={players}
          onStart={handleStartRound} />

        }
        {screen === 'score' && round &&
        <ScoreEntry
          round={round}
          onSaveRound={handleSaveRound}
          onCancelRound={handleCancelRound}
          isHost={isHost} />

        }
        {screen === 'summary' && round && finalScores &&
        <SummaryScreen
          round={round}
          scores={finalScores}
          wolfData={finalWolf}
          putts={finalPutts}
          nassauPresses={finalPresses}
          manualChips={finalChips}
          onNewRound={handleNewRound} />

        }
      </div>

      {/* Bottom Tab Nav */}
      {screen !== 'score' &&
      <div style={{ display: 'flex', borderTop: '1px solid #1E3A6E', background: '#050E1C', flexShrink: 0 }}>
          {[
        { id: 'home', icon: '🏠', label: 'HOME' },
        { id: 'setup', icon: '⛳', label: 'NEW ROUND' },
        ...(round ? [{ id: 'score', icon: '🏌️', label: 'SCORING' }] : []),
        ...(finalScores ? [{ id: 'summary', icon: '📊', label: 'RESULTS' }] : [])].
        map((tab) =>
        <div key={tab.id} onClick={() => setScreen(tab.id)}
        style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: '10px 4px', cursor: 'pointer',
          color: screen === tab.id ? tweaks.accentGold : '#4A6890', borderTop: screen === tab.id ? `2px solid ${tweaks.accentGold}` : '2px solid transparent'
        }}>
              <span style={{ fontSize: 18 }}>{tab.icon}</span>
              <span style={{ fontFamily: 'Barlow Condensed', fontSize: 10, letterSpacing: 1.5, fontWeight: 700, marginTop: 2 }}>{tab.label}</span>
            </div>
        )}
        </div>
      }

      {/* Tweaks Panel */}
      {tweaksOpen &&
      <div style={{ position: 'fixed', bottom: 80, right: 16, background: '#0F2040', border: '1px solid #1E3A6E', borderRadius: 14, padding: 16, zIndex: 500, width: 260, boxShadow: '0 8px 32px rgba(0,0,0,0.6)' }}>
          <div style={{ fontFamily: 'Barlow Condensed', fontWeight: 800, fontSize: 16, color: '#fff', letterSpacing: 1, marginBottom: 14 }}>TWEAKS</div>
          {[['accentGreen', 'Green Accent'], ['accentGold', 'Gold Accent'], ['bgColor', 'Background']].map(([k, label]) =>
        <div key={k} style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 10 }}>
              <span style={{ fontFamily: 'DM Sans', fontSize: 13, color: '#9BB4D4' }}>{label}</span>
              <input type="color" value={tweaks[k]} onChange={(e) => saveTweakKey(k, e.target.value)} style={{ border: 'none', background: 'none', cursor: 'pointer', width: 36, height: 28, opacity: "20", padding: "5px" }} />
            </div>
        )}
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginTop: 4 }}>
            <span style={{ fontFamily: 'DM Sans', fontSize: 13, color: '#9BB4D4' }}>Show Sync Code</span>
            <div onClick={() => saveTweakKey('showSyncCode', !tweaks.showSyncCode)} style={{ width: 40, height: 22, borderRadius: 11, background: tweaks.showSyncCode ? tweaks.accentGreen : '#1E3A6E', cursor: 'pointer', display: 'flex', alignItems: 'center', padding: 2, transition: 'background 0.2s' }}>
              <div style={{ width: 18, height: 18, borderRadius: '50%', background: '#fff', transform: tweaks.showSyncCode ? 'translateX(18px)' : 'translateX(0)', transition: 'transform 0.2s' }} />
            </div>
          </div>
        </div>
      }
    </div>);

};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
