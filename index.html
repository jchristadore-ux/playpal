<script>
/* ============================================================
   FIREBASE CONFIG
   ============================================================ */
var PLAYPAL_FIREBASE_CONFIG = {

  authDomain:        "playpal-sync.firebaseapp.com",

  projectId:         "playpal-sync",

  appId:             "1:97913885953:web:0e42ee9dbca2c346c0f700"
};

/* ============================================================
   STABLE DEVICE ID
   ============================================================ */
(function () {
  var stored = localStorage.getItem('pp_device_id');
  if (!stored) {
    stored = 'dev_' + Math.random().toString(36).slice(2, 10) + '_' + Date.now();
    localStorage.setItem('pp_device_id', stored);
  }
  window.__PP_DEVICE_ID = stored;
})();

/* ============================================================
   FIREBASE INIT
   ============================================================ */
var _fbApp       = null;
var _fbDb        = null;
var _fbFs        = null;
var _fbAuthReady = false;
var _fbPending   = [];

function _fbInit(cb) {
  if (_fbAuthReady) { cb && cb(true); return; }
  if (_fbApp) { _fbPending.push(cb); return; }
  try {
    _fbApp = !window.firebase.apps.length
      ? window.firebase.initializeApp(PLAYPAL_FIREBASE_CONFIG)
      : window.firebase.apps[0];
    _fbDb = window.firebase.database();
    _fbFs = window.firebase.firestore();
    window.firebase.auth().signInAnonymously()
      .then(function() {
        _fbAuthReady = true;
        var q = _fbPending.slice(); _fbPending = [];
        q.forEach(function(fn) { fn && fn(true); });
        cb && cb(true);
      })
      .catch(function(err) {
        console.warn('[PlayPal] Firebase auth failed:', err.message);
        _fbAuthReady = true;
        var q = _fbPending.slice(); _fbPending = [];
        q.forEach(function(fn) { fn && fn(false); });
        cb && cb(false);
      });
  } catch(e) {
    console.warn('[PlayPal] Firebase init failed:', e.message);
    cb && cb(false);
  }
}

/* ============================================================
   PLAYER SYNC SERVICE
   ============================================================ */
var PlayerSyncService = (function() {
  var _cb = null;
  function save(players, cb) {
    _fbInit(function(ok) {
      if (!ok) { cb && cb(false); return; }
      var obj = {};
      players.forEach(function(p) { obj[p.id] = p; });
      _fbDb.ref('players').set(obj)
        .then(function() { cb && cb(true); })
        .catch(function(e) { console.warn('[PlayerSync] save failed:', e); cb && cb(false); });
    });
  }
  function load(cb) {
    _fbInit(function(ok) {
      if (!ok) { cb(null); return; }
      _fbDb.ref('players').once('value')
        .then(function(snap) {
          var val = snap.val();
          if (!val) { cb(null); return; }
          cb(Object.values(val));
        })
        .catch(function(e) { console.warn('[PlayerSync] load failed:', e); cb(null); });
    });
  }
  function subscribe(cb) {
    _fbInit(function(ok) {
      if (!ok) return;
      if (_cb) { _fbDb.ref('players').off('value', _cb); }
      _cb = function(snap) {
        var val = snap.val();
        cb(val ? Object.values(val) : []);
      };
      _fbDb.ref('players').on('value', _cb);
    });
  }
  function unsubscribe() {
    if (_fbDb && _cb) { _fbDb.ref('players').off('value', _cb); }
    _cb = null;
  }
  return { save: save, load: load, subscribe: subscribe, unsubscribe: unsubscribe };
})();

/* ============================================================
   CUSTOM COURSE SYNC SERVICE
   ============================================================ */
var CourseSyncService = (function() {
  var _cb = null;
  function save(courses, cb) {
    _fbInit(function(ok) {
      if (!ok) { cb && cb(false); return; }
      var obj = {};
      courses.forEach(function(c) { obj[c.id] = c; });
      _fbDb.ref('courses').set(obj)
        .then(function() { cb && cb(true); })
        .catch(function(e) { console.warn('[CourseSync] save failed:', e); cb && cb(false); });
    });
  }
  function load(cb) {
    _fbInit(function(ok) {
      if (!ok) { cb(null); return; }
      _fbDb.ref('courses').once('value')
        .then(function(snap) {
          var val = snap.val();
          cb(val ? Object.values(val) : []);
        })
        .catch(function(e) { console.warn('[CourseSync] load failed:', e); cb(null); });
    });
  }
  function subscribe(cb) {
    _fbInit(function(ok) {
      if (!ok) return;
      if (_cb) { _fbDb.ref('courses').off('value', _cb); }
      _cb = function(snap) {
        var val = snap.val();
        cb(val ? Object.values(val) : []);
      };
      _fbDb.ref('courses').on('value', _cb);
    });
  }
  function unsubscribe() {
    if (_fbDb && _cb) { _fbDb.ref('courses').off('value', _cb); }
    _cb = null;
  }
  return { save: save, load: load, subscribe: subscribe, unsubscribe: unsubscribe };
})();

/* ============================================================
   ROUND SYNC SERVICE
   ============================================================ */
var RoundSyncService = (function() {
  var COLLECTION  = 'playpal_rounds';
  var _roundUnsub = null;

  function saveRound(roundObj, cb) {
    _fbInit(function(ok) {
      if (!ok) { console.warn('[RoundSync] Firebase unavailable'); cb && cb(false); return; }
      _fbFs.collection(COLLECTION).doc(roundObj.syncCode).set({
        syncCode: roundObj.syncCode,
        round:    roundObj,
        savedAt:  Date.now()
      }, { merge: true })
      .then(function() { cb && cb(true); })
      .catch(function(e) { console.warn('[RoundSync] saveRound failed:', e); cb && cb(false); });
    });
  }

  function fetchRound(syncCode, cb) {
    _fbInit(function(ok) {
      if (!ok) { cb(null, 'Firebase unavailable'); return; }
      _fbFs.collection(COLLECTION).doc(syncCode.trim().toUpperCase()).get()
        .then(function(snap) {
          if (!snap.exists) { cb(null, 'Round not found'); }
          else {
            var d = snap.data();
            cb(d.round || null, null, d);
          }
        })
        .catch(function(e) { cb(null, 'Fetch error: ' + e.message); });
    });
  }

  function writeLiveScores(syncCode, payload, cb) {
    if (!syncCode) { cb && cb(false); return; }
    _fbInit(function(ok) {
      if (!ok) { cb && cb(false); return; }
      _fbFs.collection(COLLECTION).doc(syncCode.trim().toUpperCase()).set(
        { liveScores: payload },
        { merge: true }
      )
      .then(function() { cb && cb(true); })
      .catch(function(e) { console.warn('[RoundSync] writeLiveScores failed:', e); cb && cb(false); });
    });
  }

  function subscribeRound(syncCode, deviceId, cb) {
    if (!syncCode) return;
    if (_roundUnsub) { _roundUnsub(); _roundUnsub = null; }

    _fbInit(function(ok) {
      if (!ok) {
        console.warn('[RoundSync] subscribeRound: Firebase unavailable');
        return;
      }
      var docRef = _fbFs.collection(COLLECTION).doc(syncCode.trim().toUpperCase());
      _roundUnsub = docRef.onSnapshot(
        function(snap) {
          if (!snap.exists) return;
          var data = snap.data();
          var live = data.liveScores;
          if (!live) return;
          if (live._writtenBy === deviceId) return;
          cb(live);
        },
        function(err) {
          console.warn('[RoundSync] subscribeRound listener error:', err);
        }
      );
      console.log('[PlayPal] Real-time listener attached for round', syncCode);
    });
  }

  function unsubscribeRound() {
    if (_roundUnsub) { _roundUnsub(); _roundUnsub = null; }
    console.log('[PlayPal] Real-time listener detached');
  }

  return {
    saveRound:        saveRound,
    fetchRound:       fetchRound,
    writeLiveScores:  writeLiveScores,
    subscribeRound:   subscribeRound,
    unsubscribeRound: unsubscribeRound,
  };
})();

/* ============================================================
   SAVED ROUNDS SYNC SERVICE
   ============================================================ */
var SavedRoundsSyncService = (function() {
  var _cb = null;
  function save(roundMeta, cb) {
    if (!roundMeta.syncCode) { cb && cb(false); return; }
    _fbInit(function(ok) {
      if (!ok) { cb && cb(false); return; }
      _fbDb.ref('saved_rounds/' + roundMeta.syncCode).set(roundMeta)
        .then(function() { cb && cb(true); })
        .catch(function(e) { console.warn('[SavedRoundsSync] save failed:', e); cb && cb(false); });
    });
  }
  function subscribe(cb) {
    _fbInit(function(ok) {
      if (!ok) return;
      if (_cb) { _fbDb.ref('saved_rounds').off('value', _cb); }
      _cb = function(snap) {
        var val = snap.val();
        cb(val ? Object.values(val) : []);
      };
      _fbDb.ref('saved_rounds').on('value', _cb);
    });
  }
  function unsubscribe() {
    if (_fbDb && _cb) { _fbDb.ref('saved_rounds').off('value', _cb); _cb = null; }
  }
  return { save: save, subscribe: subscribe, unsubscribe: unsubscribe };
})();

/* ============================================================
   GOLF TRIP SYNC SERVICE
   ============================================================ */
var GolfTripSyncService = (function() {
  var TRIPS_COL  = 'golf_trips';
  var ROUNDS_COL = 'playpal_rounds';

  function saveTrip(trip, cb) {
    _fbInit(function(ok) {
      if (!ok) { cb && cb(false); return; }
      _fbFs.collection(TRIPS_COL).doc(trip.id).set(trip)
        .then(function() { cb && cb(true); })
        .catch(function(e) { console.warn('[TripSync] saveTrip failed:', e); cb && cb(false); });
    });
  }

  function fetchAllTrips(cb) {
    _fbInit(function(ok) {
      if (!ok) { cb([]); return; }
      _fbFs.collection(TRIPS_COL).get()
        .then(function(snap) {
          var trips = [];
          snap.forEach(function(doc) { trips.push(doc.data()); });
          cb(trips);
        })
        .catch(function(e) { console.warn('[TripSync] fetchAllTrips failed:', e); cb([]); });
    });
  }

  function fetchTripRounds(tripId, cb) {
    _fbInit(function(ok) {
      if (!ok) { cb([]); return; }
      _fbFs.collection(ROUNDS_COL).get()
        .then(function(snap) {
          var rounds = [];
          snap.forEach(function(doc) {
            var d = doc.data();
            if (d.round && d.round.tripId === tripId) rounds.push(d);
          });
          rounds.sort(function(a, b) { return (b.savedAt || 0) - (a.savedAt || 0); });
          cb(rounds);
        })
        .catch(function(e) { console.warn('[TripSync] fetchTripRounds failed:', e); cb([]); });
    });
  }

  function deleteTrip(tripId, cb) {
    _fbInit(function(ok) {
      if (!ok) { cb && cb(false); return; }
      _fbFs.collection(TRIPS_COL).doc(tripId).delete()
        .then(function() { cb && cb(true); })
        .catch(function(e) { console.warn('[TripSync] deleteTrip failed:', e); cb && cb(false); });
    });
  }

  return { saveTrip: saveTrip, fetchAllTrips: fetchAllTrips, fetchTripRounds: fetchTripRounds, deleteTrip: deleteTrip };
})();

window.PlayerSyncService      = PlayerSyncService;
window.CourseSyncService      = CourseSyncService;
window.RoundSyncService       = RoundSyncService;
window.SavedRoundsSyncService = SavedRoundsSyncService;
window.GolfTripSyncService    = GolfTripSyncService;

/* ============================================================
   DEEP-LINK DETECTION — visual only
   ============================================================ */
(function() {
  var params   = new URLSearchParams(window.location.search);
  var rawCode  = params.get('join') || params.get('code') || '';
  var joinCode = rawCode.trim().toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0, 12);
  if (!joinCode || joinCode.length < 4) return;

  window.__pp_pending_join_code = joinCode;

  var overlay = document.getElementById('pp-join-overlay');
  var codeEl  = document.getElementById('pp-join-code-display');
  if (overlay) overlay.style.display = 'flex';
  if (codeEl)  codeEl.textContent    = joinCode;

  try {
    var u = new URL(window.location.href);
    u.searchParams.delete('join');
    u.searchParams.delete('code');
    window.history.replaceState({}, '', u.toString());
  } catch(e) {}
})();

function dismissJoinOverlay() {
  var overlay = document.getElementById('pp-join-overlay');
  if (overlay) overlay.style.display = 'none';
  window.__pp_pending_join_code = null;
}

function _updateJoinOverlay(status, error) {
  var statusEl  = document.getElementById('pp-join-status');
  var spinnerEl = document.getElementById('pp-join-spinner');
  var errorEl   = document.getElementById('pp-join-error');
  var dismissEl = document.getElementById('pp-join-dismiss');
  if (status && statusEl) statusEl.textContent = status;
  if (error) {
    if (spinnerEl)  spinnerEl.style.display  = 'none';
    if (errorEl)  { errorEl.style.display   = 'block'; errorEl.textContent = error; }
    if (dismissEl)  dismissEl.style.display  = 'block';
    if (statusEl)   statusEl.textContent     = 'Could not join round';
  }
}
</script>

<script type="text/babel">

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentGreen": "#0E2B20",
  "accentGold":  "#C8A15A",
  "bgColor":     "#F6F4EE",
  "cardBg":      "#FFFFFF",
  "showSyncCode": true
} /*EDITMODE-END*/;

const App = () => {
  const deviceId = React.useMemo(() => window.__PP_DEVICE_ID, []);

  const [screen, setScreen] = React.useState(() => {
    if (window.__pp_pending_join_code) return 'home';
    const ss = sessionStorage.getItem('pp_screen');
    if (ss) return ss;
    if (localStorage.getItem('pp_active_round') === '1') return 'score';
    return 'home';
  });

  const [players, setPlayers] = React.useState(() => {
    const saved = localStorage.getItem('pp_players');
    return saved ? JSON.parse(saved) : DEFAULT_PLAYERS;
  });

  const [customCourses, setCustomCourses] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem('pp_custom_courses') || '[]'); } catch(e) { return []; }
  });

  const [round, setRound] = React.useState(() => {
    if (window.__pp_pending_join_code) return null;
    const savedScreen = sessionStorage.getItem('pp_screen');
    const isActiveRound = savedScreen === 'score'
      || localStorage.getItem('pp_active_round') === '1';
    if (isActiveRound) {
      try {
        const saved = localStorage.getItem('pp_round');
        return saved ? JSON.parse(saved) : null;
      } catch(e) {
        localStorage.removeItem('pp_active_round');
        return null;
      }
    }
    return null;
  });

  const [finalScores,      setFinalScores]      = React.useState(null);
  const [finalWolf,        setFinalWolf]        = React.useState(null);
  const [finalPutts,       setFinalPutts]       = React.useState(null);
  const [finalPresses,     setFinalPresses]     = React.useState([]);
  const [finalChips,       setFinalChips]       = React.useState({});
  const [finalPopFlags,    setFinalPopFlags]    = React.useState(null);
  const [finalBBBData,     setFinalBBBData]     = React.useState(null);
  const [finalTeeBallData, setFinalTeeBallData] = React.useState(null);
  const [finalFirData,     setFinalFirData]     = React.useState(null);
  const [finalGirData,     setFinalGirData]     = React.useState(null);

  const [viewedRoundData, setViewedRoundData] = React.useState(null);
  const [viewSyncCode,    setViewSyncCode]    = React.useState(null);

  const [tweaks,     setTweaks]     = React.useState(TWEAK_DEFAULTS);
  const [tweaksOpen, setTweaksOpen] = React.useState(false);

  const [recentRounds, setRecentRounds] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem('pp_recent') || '[]'); } catch(e) { return []; }
  });

  const [trips,           setTrips]           = React.useState([]);
  const [viewedTrip,      setViewedTrip]      = React.useState(null);
  const [tripRounds,      setTripRounds]      = React.useState(null); // null = loading

  React.useEffect(() => { sessionStorage.setItem('pp_screen', screen); }, [screen]);

  // ── Deep-link join — runs exactly once on mount ──────────────────────────
  React.useEffect(() => {
    const code = window.__pp_pending_join_code;
    if (!code) return;
    window.__pp_pending_join_code = null;

    _updateJoinOverlay('Looking up round\u2026', null);

    try {
      const localRaw = localStorage.getItem('pp_round');
      if (localRaw) {
        const localRound = JSON.parse(localRaw);
        if (localRound.syncCode === code) { _completeJoin(localRound); return; }
      }
    } catch(e) {}

    window.RoundSyncService.fetchRound(code, function(fetchedRound, err) {
      if (!fetchedRound) {
        const msg = err === 'Round not found'
          ? 'Round "' + code + '" not found or no longer active.\nAsk the host to share their code again.'
          : 'Connection error. Check your internet and try again.';
        _updateJoinOverlay(null, msg);
        return;
      }
      _completeJoin(fetchedRound);
    });

    function _completeJoin(r) {
      localStorage.setItem('pp_round', JSON.stringify(r));
      sessionStorage.setItem('pp_screen', 'score');
      localStorage.setItem('pp_active_round', '1');
      setRound(r);
      setScreen('score');
      const overlay = document.getElementById('pp-join-overlay');
      if (overlay) overlay.style.display = 'none';
    }
  }, []);

  React.useEffect(() => {
    PlayerSyncService.subscribe(function(remotePlayers) {
      if (remotePlayers && remotePlayers.length > 0) {
        setPlayers(remotePlayers);
        localStorage.setItem('pp_players', JSON.stringify(remotePlayers));
      }
    });
    return () => { PlayerSyncService.unsubscribe(); };
  }, []);

  React.useEffect(() => {
    CourseSyncService.subscribe(function(remoteCourses) {
      setCustomCourses(function(prev) {
        const remoteIds = new Set(remoteCourses.map(function(c) { return c.id; }));
        const localOnly = prev.filter(function(c) { return !remoteIds.has(c.id); });
        const merged    = remoteCourses.concat(localOnly);
        localStorage.setItem('pp_custom_courses', JSON.stringify(merged));
        return merged;
      });
    });
    return () => { CourseSyncService.unsubscribe(); };
  }, []);

  React.useEffect(() => {
    SavedRoundsSyncService.subscribe(function(remoteRounds) {
      setRecentRounds(function(prev) {
        const merged = {};
        remoteRounds.forEach(function(r) { if (r.syncCode) merged[r.syncCode] = r; });
        prev.forEach(function(r) { if (r.syncCode) merged[r.syncCode] = r; });
        const noCode = prev.filter(function(r) { return !r.syncCode; });
        const result = Object.values(merged)
          .concat(noCode)
          .sort(function(a, b) { return (b.savedAt || 0) - (a.savedAt || 0); })
          .slice(0, 20);
        localStorage.setItem('pp_recent', JSON.stringify(result));
        return result;
      });
    });
    return () => { SavedRoundsSyncService.unsubscribe(); };
  }, []);

  React.useEffect(() => {
    if (window.GolfTripSyncService) {
      GolfTripSyncService.fetchAllTrips(function(fetched) {
        if (fetched && fetched.length > 0) {
          setTrips(fetched.sort(function(a, b) { return (b.createdAt || 0) - (a.createdAt || 0); }));
        }
      });
    }
  }, []);

  React.useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode')   setTweaksOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const saveTweakKey = (key, val) => {
    const next = { ...tweaks, [key]: val };
    setTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: val } }, '*');
  };

  const handleManagePlayers = (updated) => {
    setPlayers(updated);
    localStorage.setItem('pp_players', JSON.stringify(updated));
    PlayerSyncService.save(updated, function(ok) {
      if (!ok) console.warn('[PlayPal] Player sync to RTDB failed — saved locally');
    });
  };

  const handleCourseSaved = () => {};

  const handleStartRound = (config) => {
    const { tripSelection, ...rest } = config;

    const _finishStart = function(tripId) {
      const r = { ...rest, id: Date.now(), tripId: tripId || null };
      setRound(r);
      localStorage.setItem('pp_round', JSON.stringify(r));
      sessionStorage.setItem('pp_screen', 'score');
      localStorage.setItem('pp_active_round', '1');
      setScreen('score');
      RoundSyncService.saveRound(r, function(ok) {
        if (ok) console.log('[PlayPal] Round saved to cloud:', r.syncCode);
        else    console.warn('[PlayPal] Cloud round save failed — works locally');
      });
    };

    if (tripSelection && tripSelection.mode === 'new' && tripSelection.newTrip && tripSelection.newTrip.name) {
      const newTrip = {
        id:        'trip_' + Date.now(),
        name:      tripSelection.newTrip.name,
        location:  tripSelection.newTrip.location || '',
        startDate: new Date().toISOString().split('T')[0],
        endDate:   '',
        notes:     '',
        createdAt: Date.now(),
        updatedAt: Date.now(),
      };
      if (window.GolfTripSyncService) {
        GolfTripSyncService.saveTrip(newTrip, function() {
          setTrips(function(prev) { return [newTrip, ...prev]; });
          _finishStart(newTrip.id);
        });
      } else {
        _finishStart(null);
      }
    } else if (tripSelection && tripSelection.mode === 'existing' && tripSelection.tripId) {
      _finishStart(tripSelection.tripId);
    } else {
      _finishStart(null);
    }

  };

  const handleSaveRound = (scores, wolfData, putts, presses = [], chips = {}, popFlags = {}, bbbData = {}, teeBallData = {}, firData = {}, girData = {}) => {
    setFinalScores(scores);
    setFinalWolf(wolfData);
    setFinalPutts(putts);
    setFinalPresses(presses);
    setFinalChips(chips);
    setFinalPopFlags(popFlags);
    setFinalBBBData(bbbData);
    setFinalTeeBallData(teeBallData);
    setFinalFirData(firData);
    setFinalGirData(girData);

    RoundSyncService.unsubscribeRound();

    const holeScores = {};
    round.players.forEach(function(player) {
      holeScores[player.id] = round.course.holes.map(function(_, i) {
        return {
          strokes:    scores[player.id]?.[i] || null,
          putts:      (putts[player.id]?.[i]) || 0,
          gettingPop: !!(popFlags[player.id]?.[i]),
        };
      });
    });

    // Compute payouts at save time so trip dashboard can aggregate without re-running format logic.
    const _ptmState = window.computePTMState
      ? window.computePTMState(scores, putts || {}, round.players, round.course, round.players[0].id)
      : { holderId: null };
    const _computedPayouts = window.calcAllPayouts
      ? window.calcAllPayouts(scores, wolfData || {}, round.players, round.course, round.formats, presses || [], _ptmState.holderId, popFlags || {}, null, bbbData || {}, teeBallData || {})
      : {};

    const completedRound = {
      ...round,
      holeScores,
      payouts: _computedPayouts,
      firData:  firData || {},
      girData:  girData || {},
      tripId:  round.tripId || null,
      date: new Date().toLocaleDateString('en-US', {
        weekday:'long', month:'long', day:'numeric', year:'numeric',
      }),
    };

    RoundSyncService.saveRound(completedRound, function() {});

    if (round.syncCode) {
      const snapshot = {
        round:         completedRound,
        scores,
        wolfData,
        putts,
        nassauPresses: presses,
        popFlags,
        bbbData,
        teeBallData,
        firData,
        girData,
        savedAt:       Date.now(),
      };
      try {
        localStorage.setItem('pp_round_snap_' + round.syncCode, JSON.stringify(snapshot));
      } catch(e) {
        console.warn('[PlayPal] Could not save round snapshot locally:', e);
      }
    }

    const roundMeta = {
      courseName: round.course.name,
      date:       new Date().toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' }),
      players:    round.players.length,
      formats:    round.formats.map(f => FORMAT_INFO[f.type].label).join(' \u00b7 '),
      syncCode:   round.syncCode || null,
      tripId:     round.tripId || null,
      tripName:   round.tripId ? (trips.find(function(t){return t.id===round.tripId;})||{}).name || null : null,
      savedAt:    Date.now(),
    };

    setRecentRounds(function(prev) {
      const next = [roundMeta, ...prev.filter(r => r.syncCode !== roundMeta.syncCode)].slice(0, 20);
      localStorage.setItem('pp_recent', JSON.stringify(next));
      return next;
    });

    if (roundMeta.syncCode) {
      SavedRoundsSyncService.save(roundMeta, function(ok) {
        if (!ok) console.warn('[PlayPal] Saved round sync to RTDB failed \u2014 saved locally');
      });
    }

    localStorage.removeItem('pp_active_round');
    setScreen('summary');
  };

  const handleViewRound = (syncCode) => {
    if (!syncCode) return;
    try {
      const raw = localStorage.getItem('pp_round_snap_' + syncCode);
      if (raw) {
        const snap = JSON.parse(raw);
        setViewedRoundData(snap);
        setViewSyncCode(syncCode);
        setScreen('viewround');
        return;
      }
    } catch(e) {
      console.warn('[PlayPal] Could not read local round snapshot:', e);
    }
    setViewedRoundData(null);
    setViewSyncCode(syncCode);
    setScreen('viewround');
  };

  const handleBackFromView = () => {
    setViewedRoundData(null);
    setViewSyncCode(null);
    setScreen('home');
  };

  const handleViewTrip = (trip) => {
    setViewedTrip(trip);
    setTripRounds(null);
    setScreen('trip');
    if (window.GolfTripSyncService) {
      GolfTripSyncService.fetchTripRounds(trip.id, function(rds) {
        setTripRounds(rds || []);
      });
    } else {
      setTripRounds([]);
    }
  };

  const handleBackFromTrip = () => {
    setViewedTrip(null);
    setTripRounds(null);
    setScreen('trips');
  };

  const handleNewRound = () => {
    setRound(null);
    setFinalScores(null);
    setViewedRoundData(null);
    setViewSyncCode(null);
    localStorage.removeItem('pp_round');
    localStorage.removeItem('pp_active_round');
    sessionStorage.removeItem('pp_screen');
    setScreen('home');
  };

  const handleExitRound = () => {
    RoundSyncService.unsubscribeRound();
    sessionStorage.removeItem('pp_screen');
    localStorage.removeItem('pp_active_round');
    setScreen('home');
  };

  const handleJoinRound = (savedRound) => {
    setRound(savedRound);
    sessionStorage.setItem('pp_screen', 'score');
    localStorage.setItem('pp_active_round', '1');
    setScreen('score');
  };

  const cssVars = {
    '--green': tweaks.accentGreen,
    '--gold':  tweaks.accentGold,
    '--bg':    tweaks.bgColor,
    '--card':  tweaks.cardBg,
  };

  return (
    <div style={{ height:'100%', display:'flex', flexDirection:'column', background:tweaks.bgColor, ...cssVars }}>
      <NavBar
        syncCode={tweaks.showSyncCode && round && screen === 'score' ? round.syncCode : null}
        onHome={() => setScreen(round && screen === 'score' ? 'score' : 'home')}
        currentScreen={screen}
      />

      <div style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden', position:'relative' }}>

        {screen === 'home' &&
          <HomeScreen
            onStartRound={() => setScreen('setup')}
            players={players}
            onManagePlayers={handleManagePlayers}
            recentRounds={recentRounds}
            onJoinRound={handleJoinRound}
            onViewRound={handleViewRound}
            customCourses={customCourses}
            onCourseSaved={handleCourseSaved}
          />
        }

        {screen === 'setup' &&
          <SetupScreen
            allPlayers={players}
            customCourses={customCourses}
            onStart={handleStartRound}
          />
        }

        {screen === 'score' && round &&
          <ScoreEntry
            round={round}
            onSaveRound={handleSaveRound}
            onExitRound={handleExitRound}
            deviceId={deviceId}
          />
        }

        {screen === 'viewround' && (
          viewedRoundData ? (
            <div style={{flex:1, display:'flex', flexDirection:'column', overflow:'hidden'}}>
              <div style={{
                flexShrink:0, display:'flex', alignItems:'center', height:52,
                background:'#0E2B20', borderBottom:'1px solid rgba(255,255,255,0.1)', padding:'0 12px',
              }}>
                <button onClick={handleBackFromView} style={{
                  background:'rgba(255,255,255,0.08)', border:'1px solid rgba(255,255,255,0.15)', borderRadius:8, cursor:'pointer',
                  fontFamily:'Plus Jakarta Sans, Inter, system-ui, sans-serif', fontWeight:700, fontSize:14,
                  letterSpacing:0.5, color:'#F6F4EE', padding:'6px 12px',
                  WebkitTapHighlightColor:'transparent',
                }}>
                  ‹ BACK
                </button>
                <span style={{
                  flex:1, textAlign:'center', fontFamily:'Plus Jakarta Sans, Inter, system-ui, sans-serif',
                  fontWeight:800, fontSize:15, letterSpacing:1, color:'#C8A15A',
                }}>
                  ROUND HISTORY
                </span>
                <span style={{width:80}}/>
              </div>
              <div style={{flex:1, overflow:'hidden', display:'flex', flexDirection:'column'}}>
                <SummaryScreen
                  round={viewedRoundData.round}
                  scores={viewedRoundData.scores}
                  wolfData={viewedRoundData.wolfData}
                  putts={viewedRoundData.putts}
                  nassauPresses={viewedRoundData.nassauPresses || []}
                  manualChips={{}}
                  popFlags={viewedRoundData.popFlags || {}}
                  bbbData={viewedRoundData.bbbData || {}}
                  teeBallData={viewedRoundData.teeBallData || {}}
                  firData={viewedRoundData.firData || {}}
                  girData={viewedRoundData.girData || {}}
                  onNewRound={null}
                  readOnly={true}
                />
              </div>
            </div>
          ) : (
            <RoundViewer
              syncCode={viewSyncCode}
              onBack={handleBackFromView}
            />
          )
        )}

        {screen === 'trips' && (
          <TripListScreen
            trips={trips}
            onView={handleViewTrip}
            onNewRound={() => setScreen('setup')}
          />
        )}

        {screen === 'trip' && viewedTrip && (
          <TripDashboard
            trip={viewedTrip}
            rounds={tripRounds}
            onBack={handleBackFromTrip}
            onViewRound={handleViewRound}
          />
        )}

        {screen === 'summary' && round && finalScores &&
          <SummaryScreen
            round={round}
            scores={finalScores}
            wolfData={finalWolf}
            putts={finalPutts}
            nassauPresses={finalPresses}
            manualChips={finalChips}
            popFlags={finalPopFlags || {}}
            bbbData={finalBBBData || {}}
            teeBallData={finalTeeBallData || {}}
            firData={finalFirData || {}}
            girData={finalGirData || {}}
            onNewRound={handleNewRound}
            readOnly={false}
          />
        }

      </div>

      {/* Bottom Tab Nav — hidden on score, viewround, and trip detail screens */}
      {screen !== 'score' && screen !== 'viewround' && screen !== 'trip' &&
        <div style={{ display:'flex', borderTop:'1px solid rgba(255,255,255,0.1)', background:'#0E2B20', flexShrink:0, paddingBottom:'env(safe-area-inset-bottom, 0px)' }}>
          {[
            { id:'home',    icon:'\uD83C\uDFE0', label:'HOME' },
            { id:'trips',   icon:'\uD83D\uDDFA\uFE0F', label:'TRIPS' },
            { id:'setup',   icon:'\u26F3', label:'NEW ROUND' },
            ...(round       ? [{ id:'score',   icon:'\uD83C\uDFCC\uFE0F', label:'SCORING' }] : []),
            ...(finalScores ? [{ id:'summary', icon:'\uD83D\uDCCA', label:'RESULTS' }] : []),
            ...(round       ? [{ id:'__exit',  icon:'\uD83D\uDEAA', label:'EXIT'    }] : []),
          ].map(tab =>
            <div key={tab.id}
              onClick={() => tab.id === '__exit' ? handleExitRound() : setScreen(tab.id)}
              style={{
                flex:1, display:'flex', flexDirection:'column', alignItems:'center',
                justifyContent:'center', padding:'12px 4px 10px', cursor:'pointer',
                color: tab.id === '__exit' ? '#FCA5A5'
                     : screen === tab.id  ? tweaks.accentGold
                     : 'rgba(246,244,238,0.45)',
                borderTop: screen === tab.id && tab.id !== '__exit'
                  ? `2px solid ${tweaks.accentGold}`
                  : '2px solid transparent',
                transition: 'color 0.15s',
              }}>
              <div style={{ fontSize:20, lineHeight:1 }}>{tab.icon}</div>
              <div style={{ fontFamily:'Plus Jakarta Sans, Inter, system-ui, sans-serif', fontSize:9, fontWeight:700, letterSpacing:0.8, marginTop:4 }}>{tab.label}</div>
            </div>
          )}
        </div>
      }

      {tweaksOpen && (
        <div style={{
          position:'fixed', bottom:20, right:20, background:'#FFFFFF',
          border:'1px solid #E7E3D9', borderRadius:16, padding:16, zIndex:9998,
          minWidth:220, boxShadow:'0 8px 32px rgba(0,0,0,0.5)',
        }}>
          <div style={{ fontFamily:'Plus Jakarta Sans, Inter, system-ui, sans-serif', fontWeight:800, fontSize:14, color:'#0E2B20', letterSpacing:1, marginBottom:12 }}>APPEARANCE</div>
          {[['accentGreen','Green'],['accentGold','Gold'],['bgColor','Background'],['cardBg','Card']].map(([k,label]) =>
            <div key={k} style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:10 }}>
              <span style={{ fontFamily:'Plus Jakarta Sans, Inter, system-ui, sans-serif', fontSize:13, color:'#3F5F4A' }}>{label}</span>
              <input type="color" value={tweaks[k]} onChange={e => saveTweakKey(k, e.target.value)} style={{ border:'none', background:'none', cursor:'pointer', width:36, height:28, padding:'5px' }} />
            </div>
          )}
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginTop:4 }}>
            <span style={{ fontFamily:'Plus Jakarta Sans, Inter, system-ui, sans-serif', fontSize:13, color:'#3F5F4A' }}>Show Sync Code</span>
            <div onClick={() => saveTweakKey('showSyncCode', !tweaks.showSyncCode)} style={{ width:40, height:22, borderRadius:11, background:tweaks.showSyncCode ? tweaks.accentGreen : '#2A2A2A', cursor:'pointer', display:'flex', alignItems:'center', padding:2, transition:'background 0.2s' }}>
              <div style={{ width:18, height:18, borderRadius:'50%', background:'#fff', transform:tweaks.showSyncCode ? 'translateX(18px)' : 'translateX(0)', transition:'transform 0.2s' }} />
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
