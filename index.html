<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>PlayPal — Golf Companion</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<script src="./components/gameData.js?v=3"></script>
<script src="./components/gameUtils.js?v=3"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #0A1628; color: #fff; font-family: 'DM Sans', sans-serif; -webkit-font-smoothing: antialiased; overflow: hidden; }
  #root { height: 100%; }
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #1E3A6E; border-radius: 4px; }
  input::placeholder { color: #4A6890; }
  button { font-family: 'DM Sans', sans-serif; }
  * { -webkit-tap-highlight-color: transparent; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="./components/Shared.jsx"></script>
<script type="text/babel" src="./components/Home.jsx"></script>
<script type="text/babel" src="./components/Setup.jsx"></script>
<script type="text/babel" src="./components/PlayerCard.jsx"></script>
<script type="text/babel" src="./components/Trackers.jsx"></script>
<script type="text/babel" src="./components/ScoreEntry.jsx"></script>
<script type="text/babel" src="./components/Summary.jsx"></script>

<script type="text/babel">

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentGreen": "#3DCB6C",
  "accentGold": "#C9A84C",
  "bgColor": "#0A1628",
  "cardBg": "#0F2040",
  "showSyncCode": true
} /*EDITMODE-END*/;

console.log('[PlayPal] Boot sequence start');
window.addEventListener('error', (e) => {
  console.error('[PlayPal] Unhandled error:', e.message, e.error);
});
window.addEventListener('unhandledrejection', (e) => {
  console.error('[PlayPal] Unhandled promise rejection:', e.reason);
});

const App = () => {
  const safeLoad = (key, fallback) => {
    try {
      const raw = localStorage.getItem(key);
      return raw ? JSON.parse(raw) : fallback;
    } catch (err) {
      console.error(`[PlayPal] Failed to load localStorage key "${key}"`, err);
      return fallback;
    }
  };
  const safeSave = (key, value) => {
    try {
      localStorage.setItem(key, JSON.stringify(value));
      console.log(`[PlayPal] Saved localStorage key "${key}"`);
    } catch (err) {
      console.error(`[PlayPal] Failed to save localStorage key "${key}"`, err);
    }
  };

  const [screen, setScreen] = React.useState(() => localStorage.getItem('pp_screen') || 'home');
  const [players, setPlayers] = React.useState(() => safeLoad('pp_players', DEFAULT_PLAYERS));
  const [round, setRound] = React.useState(() => safeLoad('pp_round', null));
  const [finalScores, setFinalScores]   = React.useState(() => safeLoad('pp_finalScores', null));
  const [finalWolf,   setFinalWolf]     = React.useState(() => safeLoad('pp_finalWolf', null));
  const [finalPutts,  setFinalPutts]    = React.useState(() => safeLoad('pp_finalPutts', null));
  const [finalPresses,setFinalPresses]  = React.useState(() => safeLoad('pp_finalPresses', []));
  const [finalChips,  setFinalChips]    = React.useState(() => safeLoad('pp_finalChips', {}));
  const [tweaks, setTweaks] = React.useState(() => safeLoad('pp_tweaks', TWEAK_DEFAULTS));
  const [tweaksOpen, setTweaksOpen] = React.useState(false);

  const recentRounds = React.useMemo(() => {
    const saved = localStorage.getItem('pp_recent');
    return saved ? JSON.parse(saved) : [
    { courseName: 'Pebble Beach Golf Links', date: 'Apr 20, 2026', players: 4, formats: 'Wolf · Nassau' },
    { courseName: 'Torrey Pines South', date: 'Apr 14, 2026', players: 3, formats: 'Stableford · Skins' }];

  }, []);

  React.useEffect(() => {localStorage.setItem('pp_screen', screen);}, [screen]);
  React.useEffect(() => {safeSave('pp_tweaks', tweaks);}, [tweaks]);
  React.useEffect(() => {safeSave('pp_finalScores', finalScores);}, [finalScores]);
  React.useEffect(() => {safeSave('pp_finalWolf', finalWolf);}, [finalWolf]);
  React.useEffect(() => {safeSave('pp_finalPutts', finalPutts);}, [finalPutts]);
  React.useEffect(() => {safeSave('pp_finalPresses', finalPresses);}, [finalPresses]);
  React.useEffect(() => {safeSave('pp_finalChips', finalChips);}, [finalChips]);

  // Tweaks message handler
  React.useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweaksOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const saveTweakKey = (key, val) => {
    const next = { ...tweaks, [key]: val };
    setTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: val } }, '*');
  };

  const handleManagePlayers = (updated) => {
    console.log('[PlayPal] Updating players', updated);
    setPlayers(updated);
    localStorage.setItem('pp_players', JSON.stringify(updated));
  };

  const handleStartRound = (config) => {
    console.log('[PlayPal] Starting round', config);
    const r = { ...config, id: Date.now() };
    setRound(r);
    localStorage.setItem('pp_round', JSON.stringify(r));
    setScreen('score');
  };

  const handleSaveRound = (scores, wolfData, putts, presses=[], chips={}) => {
    console.log('[PlayPal] Saving round results');
    setFinalScores(scores);setFinalWolf(wolfData);setFinalPutts(putts);
    setFinalPresses(presses);setFinalChips(chips);
    // Save to recent rounds
    const recent = JSON.parse(localStorage.getItem('pp_recent') || '[]');
    recent.unshift({ courseName: round.course.name, date: new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }), players: round.players.length, formats: round.formats.map((f) => FORMAT_INFO[f.type].label).join(' · ') });
    localStorage.setItem('pp_recent', JSON.stringify(recent.slice(0, 5)));
    setScreen('summary');
  };

  const handleNewRound = () => {
    console.log('[PlayPal] Resetting to new round');
    setRound(null);setFinalScores(null);
    setFinalWolf(null);setFinalPutts(null);setFinalPresses([]);setFinalChips({});
    localStorage.removeItem('pp_round');
    localStorage.removeItem('pp_finalScores');
    localStorage.removeItem('pp_finalWolf');
    localStorage.removeItem('pp_finalPutts');
    localStorage.removeItem('pp_finalPresses');
    localStorage.removeItem('pp_finalChips');
    setScreen('home');
  };

  // CSS variable injection for tweaks
  const cssVars = { '--green': tweaks.accentGreen, '--gold': tweaks.accentGold, '--bg': tweaks.bgColor, '--card': tweaks.cardBg };

  return (
    <div style={{ height: '100%', display: 'flex', flexDirection: 'column', background: tweaks.bgColor, ...cssVars }}>
      <NavBar
        syncCode={tweaks.showSyncCode && round ? round.syncCode : null}
        onHome={() => setScreen(round ? 'score' : 'home')}
        currentScreen={screen} />
      

      {/* Screen Router */}
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden', position: 'relative' }}>
        {screen === 'home' &&
        <HomeScreen
          onStartRound={() => setScreen('setup')}
          players={players}
          onManagePlayers={handleManagePlayers}
          recentRounds={recentRounds}
          onJoinRound={(savedRound) => {
            setRound(savedRound);
            setScreen('score');
          }} />
        }
        {screen === 'setup' &&
        <SetupScreen
          allPlayers={players}
          onStart={handleStartRound} />

        }
        {screen === 'score' && round &&
        <ScoreEntry
          round={round}
          onSaveRound={handleSaveRound} />

        }
        {screen === 'summary' && round && finalScores &&
        <SummaryScreen
          round={round}
          scores={finalScores}
          wolfData={finalWolf}
          putts={finalPutts}
          nassauPresses={finalPresses}
          manualChips={finalChips}
          onNewRound={handleNewRound} />

        }
      </div>

      {/* Bottom Tab Nav */}
      {screen !== 'score' &&
      <div style={{ display: 'flex', borderTop: '1px solid #1E3A6E', background: '#050E1C', flexShrink: 0 }}>
          {[
        { id: 'home', icon: '🏠', label: 'HOME' },
        { id: 'setup', icon: '⛳', label: 'NEW ROUND' },
        ...(round ? [{ id: 'score', icon: '🏌️', label: 'SCORING' }] : []),
        ...(finalScores ? [{ id: 'summary', icon: '📊', label: 'RESULTS' }] : [])].
        map((tab) =>
        <div key={tab.id} onClick={() => setScreen(tab.id)}
        style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: '10px 4px', cursor: 'pointer',
          color: screen === tab.id ? tweaks.accentGold : '#4A6890', borderTop: screen === tab.id ? `2px solid ${tweaks.accentGold}` : '2px solid transparent'
        }}>
              <span style={{ fontSize: 18 }}>{tab.icon}</span>
              <span style={{ fontFamily: 'Barlow Condensed', fontSize: 10, letterSpacing: 1.5, fontWeight: 700, marginTop: 2 }}>{tab.label}</span>
            </div>
        )}
        </div>
      }

      {/* Tweaks Panel */}
      {tweaksOpen &&
      <div style={{ position: 'fixed', bottom: 80, right: 16, background: '#0F2040', border: '1px solid #1E3A6E', borderRadius: 14, padding: 16, zIndex: 500, width: 260, boxShadow: '0 8px 32px rgba(0,0,0,0.6)' }}>
          <div style={{ fontFamily: 'Barlow Condensed', fontWeight: 800, fontSize: 16, color: '#fff', letterSpacing: 1, marginBottom: 14 }}>TWEAKS</div>
          {[['accentGreen', 'Green Accent'], ['accentGold', 'Gold Accent'], ['bgColor', 'Background']].map(([k, label]) =>
        <div key={k} style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 10 }}>
              <span style={{ fontFamily: 'DM Sans', fontSize: 13, color: '#9BB4D4' }}>{label}</span>
              <input type="color" value={tweaks[k]} onChange={(e) => saveTweakKey(k, e.target.value)} style={{ border: 'none', background: 'none', cursor: 'pointer', width: 36, height: 28, opacity: "20", padding: "5px" }} />
            </div>
        )}
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginTop: 4 }}>
            <span style={{ fontFamily: 'DM Sans', fontSize: 13, color: '#9BB4D4' }}>Show Sync Code</span>
            <div onClick={() => saveTweakKey('showSyncCode', !tweaks.showSyncCode)} style={{ width: 40, height: 22, borderRadius: 11, background: tweaks.showSyncCode ? tweaks.accentGreen : '#1E3A6E', cursor: 'pointer', display: 'flex', alignItems: 'center', padding: 2, transition: 'background 0.2s' }}>
              <div style={{ width: 18, height: 18, borderRadius: '50%', background: '#fff', transform: tweaks.showSyncCode ? 'translateX(18px)' : 'translateX(0)', transition: 'transform 0.2s' }} />
            </div>
          </div>
        </div>
      }
    </div>);

};

try {
  const mountNode = document.getElementById('root');
  if (!mountNode) throw new Error('Missing #root mount node');
  const root = ReactDOM.createRoot(mountNode);
  root.render(<App />);
  console.log('[PlayPal] App mounted successfully');
} catch (err) {
  console.error('[PlayPal] Failed to mount app', err);
}
</script>
</body>
</html>
